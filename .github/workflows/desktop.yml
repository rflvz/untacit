# Desktop installers (docs/08). The Tauri shell needs the platform webview
# toolchain, so it builds here and not in ci.yml:
#   - tag v* → builds the Windows NSIS installer and attaches it to a draft
#     GitHub Release (the download the guide points users to).
#   - workflow_dispatch → same build, uploaded as a run artifact for testing.
# The sidecar is staged on the same runner (scripts/stage-sidecar.mjs), so the
# bundled better-sqlite3 binary matches the installer's platform.
name: Desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  windows-installer:
    runs-on: windows-latest
    permissions:
      contents: write # attach installers to the release on tag builds
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from package.json "packageManager"
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/app/src-tauri

      - name: Install
        run: pnpm install --frozen-lockfile

      # beforeBuildCommand (src-tauri/tauri.conf.json) builds core +
      # extractors + frontend and stages the self-contained sidecar.
      - name: Build the Windows installer (NSIS)
        if: github.event_name == 'workflow_dispatch'
        run: pnpm --filter @untacit/app tauri build --bundles nsis

      - name: Upload installer artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: untacit-windows-installer
          path: packages/app/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Build and attach the installer to a draft release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: packages/app
          tauriScript: pnpm tauri
          args: --bundles nsis
          tagName: ${{ github.ref_name }}
          releaseName: 'untacit ${{ github.ref_name }}'
          releaseDraft: true
